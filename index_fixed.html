<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบเบิกค่าตอบแทน OT รพ.ศีขรภูมิ</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Thai", "Sarabun", sans-serif;
      background: #f4f7fb;
      color: #14213d;
    }
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 32px;
    }
    .card {
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 24px;
      padding: 28px 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      border: 1px solid #e8edf3;
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1.25;
      color: #15803d;
    }
    .sub {
      margin: 0 0 18px;
      color: #667085;
      font-size: 1.02rem;
      line-height: 1.7;
    }
    .chip-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 14px 0 22px;
    }
    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: #ecfdf3;
      color: #166534;
      border: 1px solid #bbf7d0;
      font-weight: 700;
      font-size: .95rem;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .btn {
      border: none;
      border-radius: 16px;
      padding: 15px 22px;
      font-size: 1.08rem;
      font-weight: 800;
      cursor: pointer;
      min-width: 170px;
    }
    .btn-primary {
      background: #16a34a;
      color: #fff;
      box-shadow: 0 8px 18px rgba(22,163,74,.28);
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .status {
      margin: 16px auto 0;
      max-width: 560px;
      padding: 14px 16px;
      border-radius: 16px;
      line-height: 1.7;
      font-size: 1rem;
      display: none;
      text-align: left;
    }
    .status.info {
      display: block;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }
    .status.ok {
      display: block;
      background: #ecfdf3;
      color: #047857;
      border: 1px solid #a7f3d0;
    }
    .status.err {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .loading { opacity: .75; pointer-events: none; }
    .small {
      margin-top: 18px;
      color: #6b7280;
      font-size: .92rem;
      line-height: 1.7;
    }
    .debug {
      display: none;
      margin-top: 18px;
      text-align: left;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      color: #475467;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: .9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card" id="mainCard">
      <h1>ระบบเบิกค่าตอบแทน<br>รพ.ศีขรภูมิ</h1>
      <p class="sub">กรุณาเปิดผ่านแอป LINE ระบบจะตรวจสอบสิทธิ์ผู้ใช้งานจากฐานข้อมูลอัตโนมัติ แล้วพาไปยังหน้าที่เหมาะสม</p>

      <div class="chip-row">
        <div class="chip" id="chipLiff">LIFF: กำลังเชื่อมต่อ...</div>
        <div class="chip" id="chipApi">API: รอการตรวจสอบ</div>
        <div class="chip" id="chipUser">ผู้ใช้: ยังไม่ยืนยัน</div>
      </div>

      <div class="btn-row">
        <button id="retryBtn" class="btn btn-secondary" type="button">โหลดใหม่</button>
        <button id="lineLoginBtn" class="btn btn-primary" type="button">เข้าสู่ระบบ LINE</button>
      </div>

      <div id="statusBox" class="status info">กำลังเริ่มต้นระบบ...</div>
      <div class="small">ระบบนี้จะไม่เชื่อสิทธิ์จากหน้าเว็บ และจะอ่าน role จากฐานข้อมูลทุกครั้งก่อนเข้าใช้งาน</div>
      <div id="debugBox" class="debug"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009688300-9LChW0zg';
    const API_BASE = "https://script.google.com/macros/s/AKfycbwQrnldZrUUNn5Yfpj2xj53p_Ux5T-15Nk8a5lICGlZOkWMcy5rNmavqJSXovwru__0/exec";
    const DEBUG_MODE = false;

    const statusBox = document.getElementById('statusBox');
    const mainCard = document.getElementById('mainCard');
    const chipLiff = document.getElementById('chipLiff');
    const chipApi = document.getElementById('chipApi');
    const chipUser = document.getElementById('chipUser');
    const retryBtn = document.getElementById('retryBtn');
    const lineLoginBtn = document.getElementById('lineLoginBtn');
    const debugBox = document.getElementById('debugBox');

    function debugLog(text) {
      if (!DEBUG_MODE) return;
      debugBox.style.display = 'block';
      debugBox.textContent += (debugBox.textContent ? '\n' : '') + text;
      console.log(text);
    }

    function showStatus(message, type = 'info') {
      statusBox.className = 'status ' + type;
      statusBox.textContent = message;
    }

    function setLoading(isLoading) {
      if (isLoading) {
        mainCard.classList.add('loading');
      } else {
        mainCard.classList.remove('loading');
      }
    }

    function setChip(el, text, good = true) {
      el.textContent = text;
      el.style.background = good ? '#ecfdf3' : '#fef2f2';
      el.style.color = good ? '#166534' : '#b91c1c';
      el.style.borderColor = good ? '#bbf7d0' : '#fecaca';
    }

    function unwrapResponse(res) {
      return res && Object.prototype.hasOwnProperty.call(res, 'data') ? res.data : res;
    }

    function jsonpRequest(params) {
      return new Promise((resolve, reject) => {
        const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        params.callback = callbackName;
        const qs = new URLSearchParams(params).toString();
        const script = document.createElement('script');

        const cleanup = () => {
          try { delete window[callbackName]; } catch (e) {}
          if (script.parentNode) script.parentNode.removeChild(script);
        };

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('เรียก API ไม่สำเร็จ'));
        }, 10000);

        window[callbackName] = function(data) {
          clearTimeout(timer);
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          clearTimeout(timer);
          cleanup();
          reject(new Error('โหลด API ไม่สำเร็จ'));
        };

        script.src = API_BASE + '?' + qs;
        document.body.appendChild(script);
      });
    }

    async function getUserByLineId(lineUserId) {
      const res = await jsonpRequest({
        action: 'getUserByLineId',
        line_user_id: lineUserId
      });

      debugLog('getUserByLineId => ' + JSON.stringify(res));
      const payload = unwrapResponse(res);
      if (payload && payload.user) return payload.user;
      if (payload && payload.line_user_id) return payload;
      return null;
    }

    function clearSession() {
      localStorage.removeItem('line_user_id');
      localStorage.removeItem('display_name');
      localStorage.removeItem('full_name');
      localStorage.removeItem('role');
      localStorage.removeItem('department_id');
      localStorage.removeItem('department_name');
      localStorage.removeItem('status_active');
    }

    function saveSessionFromBackend(user, profile) {
      localStorage.setItem('line_user_id', user.line_user_id || profile.userId || '');
      localStorage.setItem('display_name', user.display_name || profile.displayName || '');
      localStorage.setItem('full_name', user.full_name || '');
      localStorage.setItem('role', user.role || 'staff');
      localStorage.setItem('department_id', user.department_id || '');
      localStorage.setItem('department_name', user.department_name || user.department_id || '');
      localStorage.setItem('status_active', String(user.status_active ?? true));
    }

function routeByRole(user) {
  const role = String(user.role || '').trim().toLowerCase();

  // 👑 admin / finance → ตรวจเอกสาร
  if (role === 'admin' || role === 'finance') {
    showStatus('เข้าสู่ระบบในโหมดผู้ตรวจสอบเอกสาร...', 'ok');
    setTimeout(() => {
      window.location.href = 'admin_review.html';
    }, 500);
    return;
  }

  // 👤 staff / user → ส่งเอกสาร
  if (role === 'staff' || role === 'user') {
    showStatus('เข้าสู่ระบบในโหมดส่งเอกสาร...', 'ok');
    setTimeout(() => {
      window.location.href = 'submit_docs.html';
    }, 500);
    return;
  }

  // ❌ กรณี role ไม่ถูกต้อง
  showStatus('ไม่พบสิทธิ์ใช้งานที่ถูกต้อง กรุณาติดต่อผู้ดูแลระบบ', 'err');
}

    async function initPage() {
      setLoading(true);
      showStatus('กำลังเชื่อมต่อ LINE...', 'info');

      try {
        await liff.init({ liffId: LIFF_ID });
        setChip(chipLiff, 'LIFF: เชื่อมต่อแล้ว', true);

        if (!liff.isInClient()) {
          showStatus('กรุณาเปิดระบบผ่านแอป LINE เพื่อเข้าใช้งาน', 'err');
          setChip(chipUser, 'ผู้ใช้: ยังไม่อยู่ใน LINE', false);
          return;
        }

        if (!liff.isLoggedIn()) {
          showStatus('กรุณาเข้าสู่ระบบ LINE ก่อนใช้งาน', 'info');
          setChip(chipUser, 'ผู้ใช้: ยังไม่ล็อกอิน', false);
          return;
        }

        const profile = await liff.getProfile();
        debugLog('LINE profile => ' + JSON.stringify(profile));
        setChip(chipUser, 'ผู้ใช้: ' + (profile.displayName || 'ไม่ทราบชื่อ'), true);

        showStatus('กำลังตรวจสอบข้อมูลผู้ใช้จากฐานข้อมูล...', 'info');
        const user = await getUserByLineId(profile.userId);

        if (!user) {
          clearSession();
          setChip(chipApi, 'API: ไม่พบข้อมูลผู้ใช้', false);
          showStatus('ยินดีต้อนรับผู้ใช้งานใหม่ กำลังพาไปหน้าสมัครสมาชิก...', 'info');

          localStorage.setItem('line_user_id', profile.userId || '');
          localStorage.setItem('display_name', profile.displayName || '');

          setTimeout(() => {
            window.location.href = 'register.html';
          }, 700);
          return;
        }

        setChip(chipApi, 'API: พบข้อมูลผู้ใช้', true);

        if (String(user.status_active).toUpperCase() === 'FALSE') {
          clearSession();
          showStatus('บัญชีผู้ใช้งานถูกปิดการใช้งาน กรุณาติดต่อผู้ดูแลระบบ', 'err');
          return;
        }

        saveSessionFromBackend(user, profile);
        routeByRole(user);

      } catch (err) {
        console.error(err);
        setChip(chipLiff, 'LIFF: เชื่อมต่อไม่สำเร็จ', false);
        setChip(chipApi, 'API: ตรวจสอบไม่สำเร็จ', false);
        showStatus('เริ่มต้นระบบไม่สำเร็จ: ' + (err.message || err), 'err');
      } finally {
        setLoading(false);
      }
    }

    retryBtn.addEventListener('click', () => window.location.reload());

    lineLoginBtn.addEventListener('click', async () => {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: location.href });
        } else {
          window.location.reload();
        }
      } catch (err) {
        showStatus('เปิดหน้าเข้าสู่ระบบ LINE ไม่สำเร็จ', 'err');
      }
    });

    window.addEventListener('load', initPage);
  </script>
</body>
</html>
