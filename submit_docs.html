<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ส่งเอกสารค่าตอบแทน</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f5f6fa;
  padding: 15px;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h2 {
  color: #16a34a;
}

button {
  border: none;
  padding: 12px;
  border-radius: 10px;
  width: 100%;
  font-size: 16px;
}

.btn-primary {
  background: #16a34a;
  color: white;
}

.btn-secondary {
  background: #ccc;
}

.msg {
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

.error { background: #fee2e2; color: #991b1b; }
.success { background: #dcfce7; color: #166534; }

</style>
</head>

<body>

<div class="card">
  <h2>ส่งเอกสารค่าตอบแทน</h2>

  <label>แหล่งเงิน</label>
  <select id="fund_source">
    <option value="moph">กระทรวงสาธารณสุข</option>
    <option value="mof">กระทรวงการคลัง</option>
  </select>

  <br><br>

  <label>จำนวนเงิน (สธ.)</label>
  <input id="amount_moph" type="number">

  <label>จำนวนเงิน (คลัง)</label>
  <input id="amount_mof" type="number">

  <br><br>

  <label>หมายเหตุ</label>
  <textarea id="note"></textarea>

  <br><br>

  <button class="btn-primary" onclick="submitDoc()">ส่งเอกสาร</button>
  <br><br>
  <button class="btn-secondary" onclick="goHome()">กลับหน้าหลัก</button>

  <div id="msgBox"></div>

</div>

<script>

const API_BASE = "https://script.google.com/macros/s/AKfycbxDMJBPRM2Mq99sb3qEo-lqVGU-867_SZ0ERoZ12cgc3QaJyWR1PiqluMit05D4-Qujow/exec"; // 🔴 ใส่ URL ของคุณ

// ---------- JSONP ----------
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const callbackName = 'cb_' + Date.now();
    window[callbackName] = function(data){
      resolve(data);
      script.remove();
    };
    const script = document.createElement('script');
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
    script.onerror = reject;
    document.body.appendChild(script);
  });
}

// ---------- UI ----------
function setMessage(msg, isError=false){
  const box = document.getElementById('msgBox');
  box.innerHTML = `<div class="msg ${isError?'error':'success'}">${msg}</div>`;
}

function setLoading(state){
  // optional
}

// ---------- MAIN ----------
async function submitDoc(){

  const profile = await liff.getProfile();

  const payload = {
    action: "submitDocument",
    line_user_id: profile.userId,
    display_name: profile.displayName,
    full_name: profile.displayName,

    fund_source: document.getElementById('fund_source').value,
    amount_moph: document.getElementById('amount_moph').value,
    amount_mof: document.getElementById('amount_mof').value,
    note: document.getElementById('note').value,

    submit_date: new Date().toISOString().split('T')[0],
    submit_time: new Date().toLocaleTimeString()
  };

  try{
    setLoading(true);
    setMessage("กำลังส่งข้อมูล...");

    const query = new URLSearchParams(payload).toString();
    const result = await jsonp(API_BASE + '?' + query);

    if(result && result.ok){
      setMessage("✅ ส่งเอกสารสำเร็จ");
    }else{
      throw new Error(result.message || "ส่งไม่สำเร็จ");
    }

  }catch(err){
    setMessage("❌ " + err.message, true);
  }finally{
    setLoading(false);
  }
}

// ---------- INIT ----------
async function init(){
  await liff.init({ liffId: "YOUR_LIFF_ID" });
}

function goHome(){
  window.location.href = "home.html";
}

init();

</script>

</body>
</html>
