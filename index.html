<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบเบิกค่าตอบแทน รพ.ศีขรภูมิ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: #f5f7fb;
      text-align: center;
      margin: 0;
      padding: 20px 14px 28px;
      color: #1f2937;
    }
    .card {
      background: white;
      padding: 20px 16px;
      border-radius: 20px;
      max-width: 760px;
      margin: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .title {
      color: #0b8f2f;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    #display {
      font-size: 18px;
      font-weight: 700;
      margin-top: 8px;
    }
    #statusMessage {
      font-size: 16px;
      margin-top: 6px;
      margin-bottom: 8px;
    }
    .status {
      margin: 14px 0 10px;
    }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #e8f5e9;
      margin: 5px;
      font-size: 14px;
    }
    .btn {
      background: #0b8f2f;
      color: white;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
      margin-right: 6px;
      font-size: 16px;
      font-weight: 700;
    }
    .btn:active { transform: scale(0.98); }
    .back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 9999;
      background: #ffffff;
      color: #0b8f2f;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }
    .back-btn:active { transform: scale(0.98); }
    .data-box {
      margin-top: 18px;
      text-align: left;
      background: #fafafa;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid #e5e7eb;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
      margin-bottom: 14px;
    }
    .summary-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }
    .summary-card .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .summary-card .value {
      font-size: 22px;
      font-weight: 800;
    }
    .table-wrap {
      overflow-x: auto;
      margin-top: 10px;
      -webkit-overflow-scrolling: touch;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
    }
    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
      font-size: 14px;
      text-align: left;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 8px;
      vertical-align: top;
    }
    th {
      background: #f3f4f6;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr:last-child td { border-bottom: none; }
    .status-pill {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .pill-pending { background: #fef3c7; color: #92400e; }
    .pill-approved { background: #dcfce7; color: #166534; }
    .pill-rejected { background: #fee2e2; color: #991b1b; }
    .pill-default { background: #e5e7eb; color: #374151; }
    #debug, .debug {
      display: none !important;
    }
    @media (max-width: 640px) {
      .title { font-size: 20px; }
      #display { font-size: 17px; }
      #statusMessage { font-size: 15px; }
      .summary-card .value { font-size: 20px; }
      .btn { width: 100%; margin-right: 0; }
    }
  </style>
</head>
<body>
  <button class="back-btn" type="button" onclick="goBackToRichMenu()">← เมนูหลัก</button>
  <div class="card">
    <div class="title">ระบบเบิกค่าตอบแทน<br>รพ.ศีขรภูมิ</div>

    <div id="display">กำลังโหลด...</div>
    <div id="statusMessage"></div>

    <div class="status">
      <span class="badge" id="liffStatus">LIFF: -</span>
      <span class="badge" id="scriptStatus">Apps Script: -</span>
      <span class="badge" id="sheetStatus">Google Sheet: -</span>
    </div>

    <button class="btn" onclick="location.reload()">โหลดใหม่</button>
    <button id="loginBtn" class="btn" onclick="manualLogin()" style="display:none;">เข้าสู่ระบบ LINE</button>

    <div class="data-box" id="dataBox" style="display:none;"></div>
    <div class="debug" id="debug"></div>
  </div>

  <script>
    const LIFF_ID = "2009688300-9LChW0zg";
    const API_BASE = 'https://script.google.com/macros/s/AKfycbwQrnldZrUUNn5Yfpj2xj53p_Ux5T-15Nk8a5lICGlZOkWMcy5rNmavqJSXovwru__0/exec';

    function logDebug(msg) {
      return;
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.innerText = text;
    }

    function safeStringify(err) {
      try {
        if (!err) return "unknown error";
        if (typeof err === "string") return err;
        if (err.message) return err.message;
        return JSON.stringify(err);
      } catch (_) {
        return String(err);
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        const script = document.createElement("script");
        const fullUrl = url + (url.includes("?") ? "&" : "?") + "callback=" + callbackName;

        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 10000);

        function cleanup() {
          clearTimeout(timeout);
          if (script.parentNode) script.parentNode.removeChild(script);
          delete window[callbackName];
        }

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("JSONP request failed"));
        };

        script.src = fullUrl;
        document.body.appendChild(script);
      });
    }

    function manualLogin() {
      liff.login({ redirectUri: location.href });
    }

    function goBackToRichMenu() {
      try {
        if (window.liff && liff.isInClient()) {
          liff.closeWindow();
          return;
        }
      } catch (err) {}
      history.back();
    }

    function normalizeKey(value) {
      return String(value || '').trim().toLowerCase();
    }

    function getStatusClass(value) {
      const v = normalizeKey(value);
      if (v.includes('ผ่าน') || v.includes('อนุมัติ') || v.includes('approved')) return 'pill-approved';
      if (v.includes('ไม่ผ่าน') || v.includes('rejected') || v.includes('reject')) return 'pill-rejected';
      if (v.includes('รอ') || v.includes('pending') || v.includes('ตรวจสอบ')) return 'pill-pending';
      return 'pill-default';
    }

    function renderStatusPill(value) {
      const safe = escapeHtml(value || '-');
      return `<span class="status-pill ${getStatusClass(value)}">${safe}</span>`;
    }

    function findColumnIndex(headers, possibleNames) {
      const normalizedHeaders = headers.map(h => normalizeKey(h));
      for (const name of possibleNames) {
        const idx = normalizedHeaders.indexOf(normalizeKey(name));
        if (idx !== -1) return idx;
      }
      return -1;
    }

    function buildFilteredRows(headers, rows) {
      const idxFullName = findColumnIndex(headers, ['full_name', 'fullname', 'name']);
      const idxDepartment = findColumnIndex(headers, ['department', 'department_name', 'dept_name', 'dept']);
      const idxSubmitDate = findColumnIndex(headers, ['submit_date', 'submitted_at', 'created_at', 'date']);
      const idxStatus = findColumnIndex(headers, ['status']);
      const idxReviewStatus = findColumnIndex(headers, ['review_status', 'approve_status', 'review', 'result']);

      return rows.map(row => ({
        full_name: idxFullName > -1 ? row[idxFullName] : '',
        department: idxDepartment > -1 ? row[idxDepartment] : '',
        submit_date: idxSubmitDate > -1 ? row[idxSubmitDate] : '',
        status: idxStatus > -1 ? row[idxStatus] : '',
        review_status: idxReviewStatus > -1 ? row[idxReviewStatus] : ''
      }));
    }

    function countStatuses(items) {
      let approved = 0;
      let rejected = 0;
      let pending = 0;

      items.forEach(item => {
        const value = `${item.review_status || ''} ${item.status || ''}`;
        const cls = getStatusClass(value);
        if (cls === 'pill-approved') approved += 1;
        else if (cls === 'pill-rejected') rejected += 1;
        else pending += 1;
      });

      return { approved, rejected, pending };
    }

    function renderFilteredTable(items) {
      if (!items || items.length === 0) {
        return '<div>ยังไม่มีข้อมูล</div>';
      }

      let html = '<div class="table-wrap"><table><thead><tr>' +
        '<th>ชื่อ-สกุล</th>' +
        '<th>หน่วยงาน</th>' +
        '<th>วันที่ส่ง</th>' +
        '<th>สถานะ</th>' +
        '<th>ผลตรวจสอบ</th>' +
        '</tr></thead><tbody>';

      items.forEach(item => {
        html += '<tr>' +
          `<td>${escapeHtml(item.full_name || '-')}</td>` +
          `<td>${escapeHtml(item.department || '-')}</td>` +
          `<td>${escapeHtml(item.submit_date || '-')}</td>` +
          `<td>${renderStatusPill(item.status || '-')}</td>` +
          `<td>${renderStatusPill(item.review_status || '-')}</td>` +
          '</tr>';
      });

      html += '</tbody></table></div>';
      return html;
    }

    async function loadBackend() {
      try {
        setText('scriptStatus', 'Apps Script: กำลังตรวจสอบ');
        await jsonp(API_BASE + '?action=ping');
        setText('scriptStatus', 'Apps Script: ทำงานแล้ว');

        const data = await jsonp(API_BASE + '?action=getData');
        setText('sheetStatus', data.ok ? 'Google Sheet: พร้อมใช้งาน' : 'Google Sheet: มีปัญหา');

        const dataBox = document.getElementById('dataBox');
        const filteredItems = buildFilteredRows(data.headers || [], data.latestRows || []);
        const counts = countStatuses(filteredItems);

        dataBox.style.display = 'block';
        dataBox.innerHTML = `
          <div><b>เวลาเซิร์ฟเวอร์:</b> ${escapeHtml(String(data.serverTime || '-'))}</div>
          <div><b>ชีต:</b> ${escapeHtml(String(data.sheetName || '-'))}</div>
          <div><b>จำนวนรายการล่าสุด:</b> ${escapeHtml(String(filteredItems.length || 0))}</div>
          <div><b>สถานะระบบ:</b> ${escapeHtml(String(data.message || '-'))}</div>

          <div class="summary-grid">
            <div class="summary-card">
              <div class="label">ส่งแล้วทั้งหมด</div>
              <div class="value">${filteredItems.length}</div>
            </div>
            <div class="summary-card">
              <div class="label">ผ่าน</div>
              <div class="value">${counts.approved}</div>
            </div>
            <div class="summary-card">
              <div class="label">ไม่ผ่าน</div>
              <div class="value">${counts.rejected}</div>
            </div>
            <div class="summary-card">
              <div class="label">รอตรวจสอบ</div>
              <div class="value">${counts.pending}</div>
            </div>
          </div>

          <div style="margin-top:10px;"><b>รายการส่งเอกสารล่าสุด</b></div>
          ${renderFilteredTable(filteredItems)}
        `;
      } catch (err) {
        setText('scriptStatus', 'Apps Script: มีปัญหา');
        setText('sheetStatus', 'Google Sheet: มีปัญหา');
      }
    }

    async function initApp() {
      const display = document.getElementById('display');
      const statusMessage = document.getElementById('statusMessage');

      try {
        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: false
        });

        setText('liffStatus', 'LIFF: เชื่อมต่อแล้ว');

        const inClient = liff.isInClient();
        const loggedIn = liff.isLoggedIn();

        if (!loggedIn) {
          if (inClient) {
            display.innerText = 'กำลังพาไปล็อกอิน LINE...';
            statusMessage.innerText = 'กรุณารอสักครู่';
            liff.login({ redirectUri: location.href });
            return;
          } else {
            display.innerText = 'กรุณาเปิดผ่านแอป LINE';
            statusMessage.innerText = 'หรือกดปุ่มด้านล่างเพื่อเข้าสู่ระบบ';
            document.getElementById('loginBtn').style.display = 'inline-block';
            return;
          }
        }

        const profile = await liff.getProfile();
        display.innerText = 'สวัสดี ' + (profile.displayName || 'ผู้ใช้งาน');
        statusMessage.innerText = 'เข้าสู่ระบบสำเร็จ';

        await loadBackend();
      } catch (err) {
        display.innerText = 'เริ่มต้นระบบไม่สำเร็จ';
        statusMessage.innerText = safeStringify(err);
        setText('liffStatus', 'LIFF: มีปัญหา');
        document.getElementById('loginBtn').style.display = 'inline-block';
      }
    }

    initApp();
  </script>
</body>
</html>
