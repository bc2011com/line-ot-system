<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OT Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Sarabun", "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      padding: 20px;
      border-radius: 18px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.18);
    }

    .topbar h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .topbar p {
      margin: 8px 0 0 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #eef2f7;
    }

    .card-title {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .card-value {
      font-size: 32px;
      font-weight: 700;
      color: #111827;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .panel {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #eef2f7;
    }

    .panel h3 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #111827;
    }

    .table-panel {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #eef2f7;
    }

    .table-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .table-head h3 {
      margin: 0;
      font-size: 18px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    select, button {
      padding: 10px 12px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: #fff;
    }

    button {
      background: #2563eb;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #1d4ed8;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1050px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      color: #374151;
      font-weight: 700;
      position: sticky;
      top: 0;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pending {
      background: #fef3c7;
      color: #92400e;
    }

    .approved {
      background: #dcfce7;
      color: #166534;
    }

    .rejected {
      background: #fee2e2;
      color: #b91c1c;
    }

    .neutral {
      background: #e5e7eb;
      color: #374151;
    }

    .small {
      color: #6b7280;
      font-size: 12px;
    }

    .loading, .empty {
      text-align: center;
      padding: 18px;
      color: #6b7280;
    }

    @media (max-width: 900px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .topbar h1 {
        font-size: 24px;
      }

      .card-value {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Dashboard ระบบเบิกค่าตอบแทน OT</h1>
      <p id="userInfo">กำลังโหลดข้อมูลผู้ใช้งาน...</p>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-title">เอกสารทั้งหมด</div>
        <div class="card-value" id="totalCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">รอตรวจสอบ</div>
        <div class="card-value" id="pendingCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">ผ่าน</div>
        <div class="card-value" id="approvedCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">ไม่ผ่าน</div>
        <div class="card-value" id="rejectedCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">ยอด MOPH รวม</div>
        <div class="card-value" id="mophTotal">0</div>
      </div>
      <div class="card">
        <div class="card-title">ยอด MOF รวม</div>
        <div class="card-value" id="mofTotal">0</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h3>สรุปสถานะเอกสาร</h3>
        <canvas id="pieChart"></canvas>
      </div>
      <div class="panel">
        <h3>เปรียบเทียบจำนวนเอกสาร</h3>
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <div class="table-panel">
      <div class="table-head">
        <h3>รายการเอกสาร</h3>
        <div class="filters">
          <select id="statusFilter">
            <option value="">ทุกสถานะ</option>
            <option value="รอตรวจสอบ">รอตรวจสอบ</option>
            <option value="ผ่าน">ผ่าน</option>
            <option value="ไม่ผ่าน">ไม่ผ่าน</option>
            <option value="รอ">รอ</option>
          </select>
          <button onclick="loadList()">กรองข้อมูล</button>
          <button onclick="resetFilter()">ล้างตัวกรอง</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>เลขรายงาน</th>
              <th>ชื่อผู้ยื่น</th>
              <th>แผนก</th>
              <th>แหล่งเงิน</th>
              <th>วันที่ส่ง</th>
              <th>MOPH</th>
              <th>MOF</th>
              <th>สถานะ</th>
              <th>ผลตรวจ</th>
              <th>หมายเหตุรีวิว</th>
            </tr>
          </thead>
          <tbody id="docTableBody">
            <tr><td colspan="10" class="loading">กำลังโหลดข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwQrnldZrUUNn5Yfpj2xj53p_Ux5T-15Nk8a5lICGlZOkWMcy5rNmavqJSXovwru__0/exec";

    let pieChartInstance = null;
    let barChartInstance = null;

    function getUserSession() {
      return {
        role: localStorage.getItem("role") || "staff",
        line_user_id: localStorage.getItem("line_user_id") || "",
        department_name: localStorage.getItem("department_name") || "",
        full_name: localStorage.getItem("full_name") || "",
        display_name: localStorage.getItem("display_name") || ""
      };
    }

    function buildUrl(action, extraParams = {}) {
      const user = getUserSession();
      const url = new URL(GAS_URL);

      url.searchParams.set("action", action);
      url.searchParams.set("role", user.role);
      url.searchParams.set("line_user_id", user.line_user_id);
      url.searchParams.set("department_name", user.department_name);

      Object.keys(extraParams).forEach(key => {
        const value = extraParams[key];
        if (value !== undefined && value !== null && value !== "") {
          url.searchParams.set(key, value);
        }
      });

      return url.toString();
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error("โหลดข้อมูลไม่สำเร็จ");
      }
      return await res.json();
    }

    function formatNumber(num) {
      return Number(num || 0).toLocaleString("th-TH");
    }

    function renderUserInfo() {
      const user = getUserSession();
      const displayName = user.full_name || user.display_name || "-";
      document.getElementById("userInfo").textContent =
        `ผู้ใช้งาน: ${displayName} | role: ${user.role} | แผนก: ${user.department_name || "-"}`;
    }

    function renderCards(summary) {
      document.getElementById("totalCount").textContent = formatNumber(summary.total || 0);
      document.getElementById("pendingCount").textContent = formatNumber(summary.pending || 0);
      document.getElementById("approvedCount").textContent = formatNumber(summary.approved || 0);
      document.getElementById("rejectedCount").textContent = formatNumber(summary.rejected || 0);
      document.getElementById("mophTotal").textContent = formatNumber(summary.totalAmountMoph || 0);
      document.getElementById("mofTotal").textContent = formatNumber(summary.totalAmountMof || 0);
    }

    function renderCharts(chartData) {
      const labels = chartData.map(item => item.label);
      const values = chartData.map(item => item.value);

      if (pieChartInstance) pieChartInstance.destroy();
      if (barChartInstance) barChartInstance.destroy();

      const pieCtx = document.getElementById("pieChart").getContext("2d");
      const barCtx = document.getElementById("barChart").getContext("2d");

      pieChartInstance = new Chart(pieCtx, {
        type: "pie",
        data: {
          labels,
          datasets: [{
            data: values
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: "bottom"
            }
          }
        }
      });

      barChartInstance = new Chart(barCtx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "จำนวนเอกสาร",
            data: values
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                precision: 0
              }
            }
          },
          plugins: {
            legend: {
              display: true
            }
          }
        }
      });
    }

    function getStatusBadge(status) {
      const s = String(status || "").trim();

      if (s === "รอ" || s === "รอตรวจสอบ" || s.toLowerCase() === "pending") {
        return `<span class="badge pending">${s || "รอตรวจสอบ"}</span>`;
      }
      if (s === "ผ่าน") {
        return `<span class="badge approved">${s}</span>`;
      }
      if (s === "ไม่ผ่าน") {
        return `<span class="badge rejected">${s}</span>`;
      }
      return `<span class="badge neutral">${s || "-"}</span>`;
    }

    function getReviewBadge(status) {
      const s = String(status || "").trim();

      if (!s) {
        return `<span class="badge neutral">-</span>`;
      }
      if (s === "ผ่าน") {
        return `<span class="badge approved">${s}</span>`;
      }
      if (s === "ไม่ผ่าน") {
        return `<span class="badge rejected">${s}</span>`;
      }
      if (s === "รอ" || s === "รอตรวจสอบ") {
        return `<span class="badge pending">${s}</span>`;
      }
      return `<span class="badge neutral">${s}</span>`;
    }

function renderTable(rows) {
  const tbody = document.getElementById("docTableBody");

  if (!rows || rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" class="empty">ไม่พบข้อมูล</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const name = r.full_name || r.display_name || "-";
    const dateTime = `${r.submit_date || "-"} ${r.submit_time || ""}`.trim();

    const effectiveReviewStatus = (r.review_status && String(r.review_status).trim())
      ? r.review_status
      : r.status;

    return `
      <tr>
        <td>${r.report_id || "-"}</td>
        <td>${name}</td>
        <td>${r.department_name || "-"}</td>
        <td>${r.fund_source || "-"}</td>
        <td>
          <div>${dateTime}</div>
          <div class="small">สร้าง: ${r.created_at || "-"}</div>
        </td>
        <td>${formatNumber(r.amount_moph || 0)}</td>
        <td>${formatNumber(r.amount_mof || 0)}</td>
        <td>${getStatusBadge(r.status)}</td>
        <td>${getReviewBadge(effectiveReviewStatus)}</td>
        <td>${r.review_note || "-"}</td>
      </tr>
    `;
  }).join("");
}

    async function loadDashboard() {
      try {
        const url = buildUrl("getDashboardSummary");
        const data = await fetchJson(url);

        if (!data.ok) {
          alert(data.message || "โหลด Dashboard ไม่สำเร็จ");
          return;
        }

        renderCards(data.summary || {});
        renderCharts(data.chart || []);
        renderTable(data.recent || []);
      } catch (err) {
        console.error(err);
        alert("เกิดข้อผิดพลาดในการโหลด Dashboard");
      }
    }

    async function loadList() {
      try {
        const status = document.getElementById("statusFilter").value;
        const url = buildUrl("getDashboardList", { status });
        const data = await fetchJson(url);

        if (!data.ok) {
          alert(data.message || "โหลดรายการไม่สำเร็จ");
          return;
        }

        renderTable(data.rows || []);
      } catch (err) {
        console.error(err);
        alert("เกิดข้อผิดพลาดในการโหลดรายการ");
      }
    }

    function resetFilter() {
      document.getElementById("statusFilter").value = "";
      loadDashboard();
    }

    renderUserInfo();
    loadDashboard();
  </script>
</body>
</html>
