<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OT Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Sarabun", "Segoe UI", sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.2);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 10px 0;
      font-size: 26px;
      line-height: 1.35;
      font-weight: 700;
    }

    .hero p {
      margin: 0;
      font-size: 15px;
      opacity: 0.95;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #edf2f7;
    }

    .card-title {
      color: #6b7280;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 34px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.2;
      word-break: break-word;
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .panel {
      background: #fff;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #edf2f7;
      min-height: 300px;
    }

    .panel h3,
    .table-panel h3 {
      margin: 0 0 18px 0;
      font-size: 20px;
      color: #0f172a;
    }

    .table-panel {
      background: #fff;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #edf2f7;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .toolbar select,
    .toolbar button {
      height: 50px;
      border-radius: 14px;
      font-size: 16px;
      padding: 0 16px;
    }

    .toolbar select {
      min-width: 220px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
    }

    .toolbar button {
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      min-width: 160px;
    }

    .toolbar button.secondary {
      background: #2563eb;
    }

    .toolbar button:hover {
      opacity: 0.95;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
      font-size: 15px;
    }

    th {
      background: #f8fafc;
      color: #374151;
      font-weight: 800;
      white-space: nowrap;
    }

    td {
      color: #111827;
    }

    .small {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pending {
      background: #fef3c7;
      color: #92400e;
    }

    .approved {
      background: #dcfce7;
      color: #166534;
    }

    .rejected {
      background: #fee2e2;
      color: #b91c1c;
    }

    .neutral {
      background: #e5e7eb;
      color: #374151;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 24px;
    }

    @media (max-width: 900px) {
      .grid-two {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 22px;
      }

      .card-value {
        font-size: 30px;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar select,
      .toolbar button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Dashboard ระบบเบิกค่าตอบแทน OT</h1>
      <p id="userInfo">กำลังโหลดข้อมูลผู้ใช้งาน...</p>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-title">เอกสารทั้งหมด</div>
        <div class="card-value" id="totalCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">รอตรวจสอบ</div>
        <div class="card-value" id="pendingCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">ผ่าน</div>
        <div class="card-value" id="approvedCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">ไม่ผ่าน</div>
        <div class="card-value" id="rejectedCount">0</div>
      </div>
      <div class="card">
        <div class="card-title">ยอด MOPH รวม</div>
        <div class="card-value" id="mophTotal">0</div>
      </div>
      <div class="card">
        <div class="card-title">ยอด MOF รวม</div>
        <div class="card-value" id="mofTotal">0</div>
      </div>
    </div>

    <div class="grid-two">
      <div class="panel">
        <h3>สรุปสถานะเอกสาร</h3>
        <canvas id="pieChart"></canvas>
      </div>
      <div class="panel">
        <h3>เปรียบเทียบจำนวนเอกสาร</h3>
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <div class="table-panel">
      <h3>รายการเอกสาร</h3>

      <div class="toolbar">
        <select id="statusFilter">
          <option value="">ทุกสถานะ</option>
          <option value="รอตรวจสอบ">รอตรวจสอบ</option>
          <option value="รอ">รอ</option>
          <option value="ผ่าน">ผ่าน</option>
          <option value="ไม่ผ่าน">ไม่ผ่าน</option>
        </select>
        <button type="button" onclick="loadList()">กรองข้อมูล</button>
        <button type="button" class="secondary" onclick="resetFilter()">ล้างตัวกรอง</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>เลขรายงาน</th>
              <th>ชื่อผู้ยื่น</th>
              <th>แผนก</th>
              <th>แหล่งเงิน</th>
              <th>วันที่ส่ง</th>
              <th>MOPH</th>
              <th>MOF</th>
              <th>สถานะ</th>
              <th>ผลตรวจ</th>
              <th>หมายเหตุรีวิว</th>
            </tr>
          </thead>
          <tbody id="docTableBody">
            <tr>
              <td colspan="10" class="empty">กำลังโหลดข้อมูล...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "PUT_YOUR_EXEC_URL_HERE";

    let pieChartInstance = null;
    let barChartInstance = null;

    function getUserSession() {
      return {
        role: localStorage.getItem("role") || "staff",
        line_user_id: localStorage.getItem("line_user_id") || "",
        department_name: localStorage.getItem("department_name") || "",
        full_name: localStorage.getItem("full_name") || "",
        display_name: localStorage.getItem("display_name") || ""
      };
    }

    function buildUrl(action, extraParams = {}) {
      const user = getUserSession();
      const url = new URL(GAS_URL);

      url.searchParams.set("action", action);
      url.searchParams.set("role", user.role || "");
      url.searchParams.set("line_user_id", user.line_user_id || "");
      url.searchParams.set("department_name", user.department_name || "");

      Object.keys(extraParams).forEach((key) => {
        const value = extraParams[key];
        if (value !== undefined && value !== null && value !== "") {
          url.searchParams.set(key, value);
        }
      });

      return url.toString();
    }

    async function fetchJson(url) {
      const res = await fetch(url, {
        method: "GET",
        cache: "no-store"
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        console.error("API response text:", text);
        throw new Error("API ไม่ได้ส่ง JSON กลับมา");
      }
    }

    function formatNumber(num) {
      return Number(num || 0).toLocaleString("th-TH");
    }

    function renderUserInfo() {
      const user = getUserSession();
      const displayName = user.full_name || user.display_name || "-";
      const role = user.role || "-";
      const dept = user.department_name || "-";

      const el = document.getElementById("userInfo");
      if (el) {
        el.textContent = `ผู้ใช้งาน: ${displayName} | role: ${role} | แผนก: ${dept}`;
      }
    }

    function renderCards(summary) {
      document.getElementById("totalCount").textContent = formatNumber(summary.total || 0);
      document.getElementById("pendingCount").textContent = formatNumber(summary.pending || 0);
      document.getElementById("approvedCount").textContent = formatNumber(summary.approved || 0);
      document.getElementById("rejectedCount").textContent = formatNumber(summary.rejected || 0);
      document.getElementById("mophTotal").textContent = formatNumber(summary.totalAmountMoph || 0);
      document.getElementById("mofTotal").textContent = formatNumber(summary.totalAmountMof || 0);
    }

    function renderCharts(chartData) {
      const pieCanvas = document.getElementById("pieChart");
      const barCanvas = document.getElementById("barChart");

      if (!pieCanvas || !barCanvas) return;

      const labels = (chartData || []).map(item => item.label);
      const values = (chartData || []).map(item => item.value);

      if (pieChartInstance) {
        pieChartInstance.destroy();
        pieChartInstance = null;
      }

      if (barChartInstance) {
        barChartInstance.destroy();
        barChartInstance = null;
      }

      pieChartInstance = new Chart(pieCanvas.getContext("2d"), {
        type: "pie",
        data: {
          labels: labels,
          datasets: [{
            data: values
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: "bottom"
            }
          }
        }
      });

      barChartInstance = new Chart(barCanvas.getContext("2d"), {
        type: "bar",
        data: {
          labels: labels,
          datasets: [{
            label: "จำนวนเอกสาร",
            data: values
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                precision: 0
              }
            }
          }
        }
      });
    }

    function getStatusBadge(status) {
      const s = String(status || "").trim();

      if (s === "รอ" || s === "รอตรวจสอบ" || s.toLowerCase() === "pending") {
        return `<span class="badge pending">${s || "รอตรวจสอบ"}</span>`;
      }
      if (s === "ผ่าน") {
        return `<span class="badge approved">${s}</span>`;
      }
      if (s === "ไม่ผ่าน") {
        return `<span class="badge rejected">${s}</span>`;
      }
      return `<span class="badge neutral">${s || "-"}</span>`;
    }

    function getReviewBadge(status) {
      const s = String(status || "").trim();

      if (!s) {
        return `<span class="badge neutral">-</span>`;
      }
      if (s === "ผ่าน") {
        return `<span class="badge approved">${s}</span>`;
      }
      if (s === "ไม่ผ่าน") {
        return `<span class="badge rejected">${s}</span>`;
      }
      if (s === "รอ" || s === "รอตรวจสอบ") {
        return `<span class="badge pending">${s}</span>`;
      }
      return `<span class="badge neutral">${s}</span>`;
    }

    function renderTable(rows) {
      const tbody = document.getElementById("docTableBody");

      if (!tbody) return;

      if (!rows || rows.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="10" class="empty">ไม่พบข้อมูล</td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = rows.map(r => {
        const name = r.full_name || r.display_name || "-";
        const dateTime = `${r.submit_date || "-"} ${r.submit_time || ""}`.trim();

        const effectiveReviewStatus = (r.review_status && String(r.review_status).trim())
          ? r.review_status
          : r.status;

        return `
          <tr>
            <td>${r.report_id || "-"}</td>
            <td>${name}</td>
            <td>${r.department_name || "-"}</td>
            <td>${r.fund_source || "-"}</td>
            <td>
              <div>${dateTime}</div>
              <span class="small">สร้าง: ${r.created_at || "-"}</span>
            </td>
            <td>${formatNumber(r.amount_moph || 0)}</td>
            <td>${formatNumber(r.amount_mof || 0)}</td>
            <td>${getStatusBadge(r.status)}</td>
            <td>${getReviewBadge(effectiveReviewStatus)}</td>
            <td>${r.review_note || "-"}</td>
          </tr>
        `;
      }).join("");
    }

    async function loadDashboard() {
      try {
        const url = buildUrl("getDashboardSummary");
        console.log("Dashboard URL:", url);

        const data = await fetchJson(url);
        console.log("Dashboard data:", data);

        if (!data.ok) {
          throw new Error(data.message || "โหลด Dashboard ไม่สำเร็จ");
        }

        renderCards(data.summary || {});
        renderCharts(data.chart || []);
        renderTable(data.recent || []);
      } catch (err) {
        console.error("โหลด dashboard ไม่สำเร็จ:", err);
        alert("โหลด Dashboard ไม่สำเร็จ");
      }
    }

    async function loadList() {
      try {
        const status = document.getElementById("statusFilter").value || "";
        const url = buildUrl("getDashboardList", { status });
        console.log("List URL:", url);

        const data = await fetchJson(url);
        console.log("List data:", data);

        if (!data.ok) {
          throw new Error(data.message || "โหลดรายการไม่สำเร็จ");
        }

        renderTable(data.rows || []);
      } catch (err) {
        console.error("โหลดรายการไม่สำเร็จ:", err);
        alert("โหลดรายการไม่สำเร็จ");
      }
    }

    function resetFilter() {
      const select = document.getElementById("statusFilter");
      if (select) select.value = "";
      loadDashboard();
    }

    document.addEventListener("DOMContentLoaded", function () {
      renderUserInfo();
      loadDashboard();
    });
  </script>
</body>
</html>
