<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard ระบบ OT</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{
      margin:0;
      font-family:'Sarabun',system-ui,sans-serif;
      background:#f4f7fb;
      color:#1f2937;
    }
    .topbar{
      background:linear-gradient(135deg,#0a8f2f,#16a34a);
      color:#fff;
      padding:24px 18px 28px;
      border-bottom-left-radius:26px;
      border-bottom-right-radius:26px;
      box-shadow:0 8px 24px rgba(10,143,47,.2);
    }
    .title{
      font-size:28px;
      font-weight:800;
      margin:0 0 6px;
    }
    .subtitle{
      font-size:16px;
      margin:0;
      opacity:.95;
    }
    .wrap{
      max-width:960px;
      margin:0 auto;
      padding:18px;
    }
    .card{
      background:#fff;
      border-radius:20px;
      padding:18px;
      box-shadow:0 8px 24px rgba(0,0,0,.06);
      margin-bottom:16px;
    }
    .profile-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .field{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:12px;
    }
    .field label{
      display:block;
      font-size:13px;
      color:#6b7280;
      margin-bottom:6px;
    }
    .value{
      font-size:17px;
      font-weight:700;
      word-break:break-word;
    }
    .status{
      margin-top:14px;
      background:#eef6ff;
      color:#1e3a8a;
      border-radius:14px;
      padding:12px;
      font-size:14px;
    }
    .menu-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:8px;
    }
    .menu-btn{
      display:flex;
      min-height:132px;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:8px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:20px;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
      text-decoration:none;
      color:#0f172a;
      font-weight:800;
      cursor:pointer;
    }
    .menu-btn .icon{
      font-size:36px;
    }
    .menu-btn small{
      color:#4b5563;
      font-size:14px;
      font-weight:600;
    }
    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }
    .btn-primary{
      background:#0a8f2f;
      color:#fff;
    }
    .btn-secondary{
      background:#e5e7eb;
      color:#111827;
    }
    .debug{
      margin-top:14px;
      background:#f3f4ff;
      border-radius:14px;
      padding:12px;
      font-size:12px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    @media (max-width:640px){
      .profile-grid,.menu-grid{grid-template-columns:1fr;}
      .title{font-size:24px;}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Dashboard ระบบ OT</div>
    <p class="subtitle">ระบบเบิกค่าตอบแทน รพ.ศีขรภูมิ</p>
  </div>

  <div class="wrap">
    <div class="card">
      <h2 style="margin-top:0">ข้อมูลผู้ใช้งาน</h2>
      <div class="profile-grid">
        <div class="field">
          <label>ชื่อจาก LINE</label>
          <div id="display_name" class="value">-</div>
        </div>
        <div class="field">
          <label>ชื่อ-สกุล</label>
          <div id="full_name" class="value">-</div>
        </div>
        <div class="field">
          <label>สิทธิ์การใช้งาน</label>
          <div id="role" class="value">-</div>
        </div>
        <div class="field">
          <label>หน่วยงาน / แผนก</label>
          <div id="department_name" class="value">-</div>
        </div>
        <div class="field">
          <label>เบอร์โทร</label>
          <div id="phone" class="value">-</div>
        </div>
        <div class="field">
          <label>อีเมล</label>
          <div id="email" class="value">-</div>
        </div>
      </div>

      <div id="status" class="status">กำลังโหลดข้อมูล...</div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="openRegister()">แก้ไขข้อมูลส่วนตัว</button>
        <button class="btn btn-secondary" onclick="closeLiff()">ปิดหน้าต่าง</button>
      </div>

      <div id="debug" class="debug"></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0">เมนูหลัก</h2>
      <div class="menu-grid">
        <a class="menu-btn" href="javascript:void(0)" onclick="window.location.href='task.html'">
          <div class="icon">📣</div>
          <div>คำสั่งปฏิบัติงาน</div>
          <small>Task</small>
        </a>

        <a class="menu-btn" href="javascript:void(0)" onclick="window.location.href='submit_docs.html'">
          <div class="icon">📄</div>
          <div>ส่งเอกสาร</div>
          <small>Submit Docs</small>
        </a>

        <a class="menu-btn" href="javascript:void(0)" onclick="window.location.href='history.html'">
          <div class="icon">✅</div>
          <div>ตรวจสอบสถานะ</div>
          <small>Track Status</small>
        </a>

        <a class="menu-btn" href="javascript:void(0)" onclick="window.location.href='https://drive.google.com/drive/folders/1pyXYtzhOG2yYzNODw9VcGK74y4ePlf9R?usp=sharing
'">
          <div class="icon">📁</div>
          <div>ดาวน์โหลดฟอร์ม</div>
          <small>Download Form</small>
        </a>
          <small>Download Form</small>
      </a>
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009688300-9LChW0zg";
    const API_BASE = "https://script.google.com/macros/s/AKfycbxDMJBPRM2Mq99sb3qEo-lqVGU-867_SZ0ERoZ12cgc3QaJyWR1PiqluMit05D4-Qujow/exec";

    function log(msg){
      const el = document.getElementById('debug');
      el.innerText += msg + "\n";
      console.log(msg);
    }

    function setStatus(msg){
      document.getElementById('status').innerText = msg;
    }

    function jsonp(url){
      return new Promise((resolve,reject)=>{
        const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
        const script = document.createElement('script');
        const src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;

        const timer = setTimeout(()=>{
          cleanup();
          reject(new Error('JSONP timeout'));
        },10000);

        function cleanup(){
          clearTimeout(timer);
          if(script.parentNode) script.parentNode.removeChild(script);
          try { delete window[cb]; } catch(e) {}
        }

        window[cb] = function(data){
          cleanup();
          resolve(data);
        };

        script.onerror = function(){
          cleanup();
          reject(new Error('JSONP failed'));
        };

        script.src = src;
        document.body.appendChild(script);
      });
    }

    function roleLabel(role){
      const map = {
        staff: 'เจ้าหน้าที่',
        department_rep: 'ผู้แทนหน่วยงาน',
        finance: 'การเงิน',
        admin: 'ผู้ดูแลระบบ'
      };
      return map[role] || role || '-';
    }

    function openRegister(){
      location.href = 'register_fixed.html';
    }

    function closeLiff(){
      if(window.liff && liff.isInClient()){
        liff.closeWindow();
      }else{
        alert('สามารถปิดได้เมื่อเปิดผ่าน LINE');
      }
    }

    function comingSoon(name){
      alert(name + ' กำลังพัฒนา');
    }
    function goPage(page){
      const LIFF_ID = "2009688300-9LChW0zg";
      window.location.href = "https://liff.line.me/" + LIFF_ID + "?path=" + encodeURIComponent(page);
    }

    
    async function initDashboard(){
      try{
        setStatus('กำลังเชื่อมต่อ LINE...');
        await liff.init({ liffId: LIFF_ID });
        log('liff.init สำเร็จ');

        if(!liff.isLoggedIn()){
          liff.login({ redirectUri: location.href });
          return;
        }

        const profile = await liff.getProfile();
        const lineUserId = profile.userId || '';
        const displayName = profile.displayName || '';
        document.getElementById('display_name').innerText = displayName || '-';
        log('LINE User ID: ' + lineUserId);

        setStatus('กำลังโหลดข้อมูลผู้ใช้...');
        const res = await jsonp(API_BASE + '?action=getUserByLineId&line_user_id=' + encodeURIComponent(lineUserId));
        log('getUserByLineId response: ' + JSON.stringify(res));

        if(!(res && res.data)){
          setStatus('ยังไม่พบข้อมูลผู้ใช้ กำลังไปหน้าสมัครสมาชิก...');
          setTimeout(() => {
            location.href = 'register_fixed.html';
          }, 800);
          return;
        }

        const user = res.data;
        document.getElementById('full_name').innerText = user.full_name || '-';
        document.getElementById('role').innerText = roleLabel(user.role);
        document.getElementById('department_name').innerText = user.department_name || user.department_id || '-';
        document.getElementById('phone').innerText = user.phone || '-';
        document.getElementById('email').innerText = user.email || '-';

        setStatus('เข้าสู่ระบบสำเร็จ');
      }catch(err){
        log('ERROR: ' + (err.message || err));
        setStatus('เกิดข้อผิดพลาดในการโหลดข้อมูล');
      }
    }

    initDashboard();

    
  </script>
</body>
</html>
