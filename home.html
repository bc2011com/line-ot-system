<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเบิกค่าตอบแทน</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body{
      margin:0;
      font-family:'Sarabun',sans-serif;
      background:#16a34a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      width:90%;
      max-width:400px;
    }

    h1{
      color:#16a34a;
      margin-bottom:10px;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      margin-top:10px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-primary{
      background:#16a34a;
      color:white;
    }

    .btn-secondary{
      background:#e5e7eb;
    }

    .msg{
      margin-top:15px;
      color:#dc2626;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>ระบบเบิกค่าตอบแทน</h1>
    <p>รพ.ศีขรภูมิ</p>

    <button class="btn btn-primary" onclick="goDashboard()">เข้าสู่ระบบ</button>
    <button class="btn btn-secondary" onclick="goRegister()">สมัครสมาชิกใหม่</button>

    <div id="msg" class="msg"></div>
  </div>

<script>

const LIFF_ID = "2009688300-9LChW0zg";

async function init(){
  try{
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

  }catch(err){
    document.getElementById('msg').innerText = err.message;
  }
}

function goDashboard(){
  window.location.href = "dashboard.html";
}

function goRegister(){
  window.location.href = "register.html";
}

init();

</script>

</body>
</html>
