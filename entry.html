<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE OT System - Entry</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{margin:0;font-family:'Sarabun',system-ui,sans-serif;background:#f4f7fb;color:#1f2937;}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;}
    .card{width:100%;max-width:560px;background:#fff;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:28px 22px;text-align:center;}
    h1{margin:0 0 10px;color:#0a8f2f;font-size:32px;line-height:1.2;}
    .sub{color:#4b5563;margin-bottom:18px;font-size:18px;}
    .status{background:#eef6ff;color:#1e3a8a;border-radius:14px;padding:14px;margin-top:16px;font-size:16px;line-height:1.5;}
    .spinner{width:52px;height:52px;border:5px solid #dbeafe;border-top:5px solid #0a8f2f;border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite;}
    @keyframes spin{to{ transform:rotate(360deg); }}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="spinner"></div>
      <h1>กำลังตรวจสอบข้อมูลผู้ใช้</h1>
      <div class="sub">ระบบเบิกค่าตอบแทน รพ.ศีขรภูมิ</div>
      <div id="status" class="status">กรุณารอสักครู่...</div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009688300-9LChW0zg";
    const API_BASE = "https://script.google.com/macros/s/AKfycbxDMJBPRM2Mq99sb3qEo-lqVGU-867_SZ0ERoZ12cgc3QaJyWR1PiqluMit05D4-Qujow/exec";

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const cb = "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        const script = document.createElement("script");
        const fullUrl = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
        const timeout = setTimeout(() => { cleanup(); reject(new Error("JSONP timeout")); }, 10000);
        function cleanup() { clearTimeout(timeout); if (script.parentNode) script.parentNode.removeChild(script); try { delete window[cb]; } catch(e){} }
        window[cb] = function(data) { cleanup(); resolve(data); };
        script.onerror = function() { cleanup(); reject(new Error("JSONP failed")); };
        script.src = fullUrl;
        document.body.appendChild(script);
      });
    }

    function setStatus(msg){ document.getElementById("status").innerText = msg; }

    async function goNext(){
      try{
        setStatus('กำลังเชื่อมต่อ LINE...');
        await liff.init({ liffId: LIFF_ID });

        if(!liff.isLoggedIn()){
          liff.login({ redirectUri: location.href });
          return;
        }

        setStatus('กำลังโหลดข้อมูลผู้ใช้...');
        const profile = await liff.getProfile();
        const lineUserId = profile.userId || '';

        const res = await jsonp(API_BASE + "?action=getUserByLineId&line_user_id=" + encodeURIComponent(lineUserId));
        const user = res && Object.prototype.hasOwnProperty.call(res, 'data') ? res.data : res;

        if(user && user.line_user_id){
          setStatus('พบข้อมูลเดิม กำลังเข้าสู่หน้าหลัก...');
          setTimeout(() => { location.href = 'dashboard.html'; }, 700);
        }else{
          setStatus('ยังไม่พบข้อมูลผู้ใช้ กำลังไปหน้าสมัครสมาชิก...');
          setTimeout(() => { location.href = 'register.html'; }, 700);
        }
      }catch(err){
        setStatus('เกิดข้อผิดพลาดในการตรวจสอบข้อมูล');
      }
    }

    goNext();
  </script>
</body>
</html>
