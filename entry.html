<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE OT System - Entry</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{
      margin:0;
      font-family:'Sarabun',system-ui,sans-serif;
      background:#f4f7fb;
      color:#1f2937;
    }
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }
    .card{
      width:100%;
      max-width:560px;
      background:#fff;
      border-radius:24px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      padding:28px 22px;
      text-align:center;
    }
    h1{
      margin:0 0 10px;
      color:#0a8f2f;
      font-size:32px;
      line-height:1.2;
    }
    .sub{
      color:#4b5563;
      margin-bottom:18px;
      font-size:18px;
    }
    .status{
      background:#eef6ff;
      color:#1e3a8a;
      border-radius:14px;
      padding:14px;
      margin-top:16px;
      font-size:16px;
      line-height:1.5;
    }
    .debug{
      display:none;
      margin-top:16px;
      background:#f3f4ff;
      color:#374151;
      border-radius:14px;
      padding:12px;
      text-align:left;
      font-size:12px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .spinner{
      width:52px;
      height:52px;
      border:5px solid #dbeafe;
      border-top:5px solid #0a8f2f;
      border-radius:50%;
      margin:0 auto 18px;
      animation:spin 1s linear infinite;
    }
    @keyframes spin{
      to{ transform:rotate(360deg); }
    }
    .btn{
      display:inline-block;
      margin-top:16px;
      background:#0a8f2f;
      color:#fff;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="spinner"></div>
      <h1>กำลังตรวจสอบข้อมูลผู้ใช้</h1>
      <div class="sub">ระบบเบิกค่าตอบแทน รพ.ศีขรภูมิ</div>
      <div id="status" class="status">กรุณารอสักครู่...</div>
      <div id="debug" class="debug" style="display:none;"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009688300-9LChW0zg";
    const API_BASE = "https://script.google.com/macros/s/AKfycbxDMJBPRM2Mq99sb3qEo-lqVGU-867_SZ0ERoZ12cgc3QaJyWR1PiqluMit05D4-Qujow/exec";

    const DEBUG_MODE = false;

    function log(msg){
      if(!DEBUG_MODE) return;
        const el = document.getElementById('debug');
      if(el) el.innerText += msg + "\n";
        console.log(msg);
    }

    function setStatus(msg){
      document.getElementById('status').innerText = msg;
    }

    function jsonp(url){
      return new Promise((resolve,reject)=>{
        const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
        const script = document.createElement('script');
        const src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;

        const timer = setTimeout(()=>{
          cleanup();
          reject(new Error('JSONP timeout'));
        },10000);

        function cleanup(){
          clearTimeout(timer);
          if(script.parentNode) script.parentNode.removeChild(script);
          try { delete window[cb]; } catch(e) {}
        }

        window[cb] = function(data){
          cleanup();
          resolve(data);
        };

        script.onerror = function(){
          cleanup();
          reject(new Error('JSONP failed'));
        };

        script.src = src;
        document.body.appendChild(script);
      });
    }

    async function goNext(){
      try{
        log('เริ่ม liff.init()');
        setStatus('กำลังเชื่อมต่อ LINE...');
        await liff.init({ liffId: LIFF_ID });
        log('liff.init สำเร็จ');

        if(!liff.isLoggedIn()){
          log('ยังไม่ login');
          liff.login({ redirectUri: location.href });
          return;
        }

        setStatus('กำลังโหลดข้อมูลผู้ใช้...');
        const profile = await liff.getProfile();
        const lineUserId = profile.userId || '';
        const displayName = profile.displayName || '';
        log('LINE User ID: ' + lineUserId);
        log('Display Name: ' + displayName);

        if(!lineUserId){
          throw new Error('ไม่พบ LINE User ID');
        }

        const res = await jsonp(API_BASE + '?action=getUserByLineId&line_user_id=' + encodeURIComponent(lineUserId));
        log('getUserByLineId response: ' + JSON.stringify(res));

        if(res && res.data){
          setStatus('พบข้อมูลเดิม กำลังเข้าสู่หน้าหลัก...');
          setTimeout(() => {
            location.href = 'dashboard.html';
          }, 700);
        }else{
          setStatus('ยังไม่พบข้อมูลผู้ใช้ กำลังไปหน้าสมัครสมาชิก...');
          setTimeout(() => {
            location.href = 'register_fixed.html';
          }, 700);
        }
      }catch(err){
        log('ERROR: ' + (err.message || err));
        setStatus('เกิดข้อผิดพลาดในการตรวจสอบข้อมูล');
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = 'ลองใหม่';
        btn.onclick = () => location.reload();
        document.querySelector('.card').appendChild(btn);
      }
    }

    goNext();
  </script>
</body>
</html>
