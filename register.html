<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครสมาชิก / เข้าสู่ระบบ</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: 'Sarabun', sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #28a745;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 18px;
}

.msg {
  margin-top: 10px;
  color: green;
}
</style>
</head>

<body>
<div class="container">

<h2>สมัครสมาชิก / เข้าสู่ระบบ</h2>

<input id="display_name" placeholder="ชื่อจาก LINE" readonly>
<input id="full_name" placeholder="ชื่อ-สกุล">

<label>ตำแหน่งสิทธิ์ใช้งาน</label>
<select id="role">
  <option value="staff">เจ้าหน้าที่</option>
  <option value="admin">admin</option>
</select>

<label>หน่วยงาน</label>
<select id="department_id"></select>

<input id="phone" placeholder="เบอร์โทร">
<input id="email" placeholder="อีเมล">

<input type="hidden" id="line_user_id">

<button onclick="saveUser()">บันทึกข้อมูล</button>

<div id="msg"></div>

</div>

<script>
const LIFF_ID = "2009688300-9LChW0zg";
const API_BASE = "https://bc2011com.github.io/line-ot-system/home.html";

async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  document.getElementById('display_name').value = profile.displayName;
  document.getElementById('line_user_id').value = profile.userId;

  await loadDepartments();
  await loadExistingUser(profile.userId);
}

async function loadDepartments() {
  const res = await fetch(API_BASE, {
    method: "POST",
    body: JSON.stringify({ action: "getDepartments" })
  });
  const data = await res.json();

  const sel = document.getElementById("department_id");
  sel.innerHTML = "";

  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.department_id;
    opt.text = d.department_name;
    sel.appendChild(opt);
  });
}

async function loadExistingUser(userId) {
  const res = await fetch(API_BASE, {
    method: "POST",
    body: JSON.stringify({
      action: "getUserByLineId",
      line_user_id: userId
    })
  });

  const user = await res.json();

  if (user && user.line_user_id) {
    document.getElementById("full_name").value = user.full_name || "";
    document.getElementById("role").value = user.role || "staff";
    document.getElementById("department_id").value = user.department_id || "";
    document.getElementById("phone").value = user.phone || "";
    document.getElementById("email").value = user.email || "";
  }
}

async function saveUser() {
  const payload = {
    action: "saveUser",
    data: {
      line_user_id: document.getElementById("line_user_id").value,
      display_name: document.getElementById("display_name").value,
      full_name: document.getElementById("full_name").value,
      role: document.getElementById("role").value,
      department_id: document.getElementById("department_id").value,
      phone: document.getElementById("phone").value,
      email: document.getElementById("email").value,
      status_active: "TRUE"
    }
  };

  const res = await fetch(API_BASE, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const result = await res.json();

  document.getElementById("msg").innerHTML = result.message;

  // 🔥 สำคัญ: โหลดข้อมูลใหม่ทันที
  await loadExistingUser(payload.data.line_user_id);
}

init();
</script>

</body>
</html>
