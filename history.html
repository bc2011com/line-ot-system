<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตรวจสอบสถานะเอกสาร</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{margin:0;font-family:'Sarabun',system-ui,sans-serif;background:#f4f7fb;color:#111827;}
    .topbar{background:linear-gradient(135deg,#0a8f2f,#16a34a);color:#fff;padding:24px 18px 30px;border-bottom-left-radius:26px;border-bottom-right-radius:26px;box-shadow:0 8px 24px rgba(10,143,47,.22);}
    .title{margin:0 0 6px;font-size:30px;font-weight:800;}
    .subtitle{margin:0;font-size:16px;opacity:.95;}
    .wrap{max-width:960px;margin:0 auto;padding:18px;}
    .card{background:#fff;border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.06);margin-bottom:16px;}
    h2{margin:0 0 12px;font-size:24px;}
    .subhead{margin:0 0 10px;color:#4b5563;line-height:1.6;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    label{display:block;font-size:16px;font-weight:700;margin:8px 0 6px;}
    input{width:100%;box-sizing:border-box;padding:14px;border:1px solid #d1d5db;border-radius:12px;font-size:16px;background:#eef2f7;}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
    .btn{border:none;border-radius:12px;padding:14px 18px;font-size:16px;font-weight:800;cursor:pointer;}
    .btn-secondary{background:#e5e7eb;color:#111827;}
    .msg{margin-top:14px;padding:12px 14px;border-radius:12px;background:#eef7ee;color:#166534;font-size:16px;line-height:1.6;white-space:pre-wrap;display:none;}
    .msg.error{background:#fef2f2;color:#991b1b;}
    .debug{display:none; margin-top:14px;padding:12px 14px;border-radius:12px;background:#eef2ff;color:#374151;font-size:12px;white-space:pre-wrap;word-break:break-word;}
    .report-list{display:grid;gap:12px;}
    .report-item{border:1px solid #e5e7eb;border-radius:16px;padding:14px;background:#f8fafc;}
    .report-head{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
    .report-id{font-weight:800;font-size:18px;color:#0f172a;}
    .status{display:inline-block;padding:6px 10px;border-radius:999px;font-size:14px;font-weight:800;}
    .status.pending{background:#fef3c7;color:#92400e;}
    .status.approved{background:#dcfce7;color:#166534;}
    .status.rejected{background:#fee2e2;color:#991b1b;}
    .status.default{background:#e5e7eb;color:#374151;}
    .meta{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 14px;font-size:15px;}
    .docs{margin-top:10px;padding-top:10px;border-top:1px dashed #cbd5e1;font-size:15px;line-height:1.6;}
    .empty{text-align:center;padding:26px 14px;color:#6b7280;font-size:16px;border:1px dashed #cbd5e1;border-radius:16px;background:#fff;}
    .review-note{margin-top:10px;background:#fff;padding:12px 14px;border-radius:12px;border-left:5px solid #f59e0b;}
    @media (max-width:760px){.grid,.meta{grid-template-columns:1fr;}.title{font-size:24px;}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">ตรวจสอบสถานะเอกสาร</div>
    <p class="subtitle">ระบบเบิกค่าตอบแทน รพ.ศีขรภูมิ</p>
  </div>

  <div class="wrap">
    <div class="card">
      <h2>ข้อมูลผู้ใช้งาน</h2>
      <div class="grid">
        <div><label>ชื่อจาก LINE</label><input id="display_name" readonly></div>
        <div><label>ชื่อ-สกุล</label><input id="full_name" readonly></div>
        <div><label>หน่วยงาน / แผนก</label><input id="department_name" readonly></div>
        <div><label>LINE User ID</label><input id="line_user_id" readonly></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="goDashboard()">กลับหน้าหลัก</button>
      </div>
      <div id="msg" class="msg"></div>
      <div id="debug" class="debug" style="display:none;"></div>
    </div>

    <div class="card">
      <h2>ประวัติการส่งเอกสาร</h2>
      <p class="subhead">แสดงรายการเอกสารที่คุณส่งเข้าระบบ พร้อมผลการตรวจของเจ้าหน้าที่</p>
      <div id="report_list" class="report-list"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009688300-9LChW0zg";
    const API_BASE = 'https://script.google.com/macros/s/AKfycbwQrnldZrUUNn5Yfpj2xj53p_Ux5T-15Nk8a5lICGlZOkWMcy5rNmavqJSXovwru__0/exec';

const DEBUG_MODE = false;

    function log(msg){
      if(!DEBUG_MODE) return;
      const el = document.getElementById('debug');
      if(el) el.innerText += msg + "\\n";
      console.log(msg);
    }

    function setMessage(msg, isError=false){
      const el = document.getElementById('msg');
      el.style.display = msg ? 'block' : 'none';
      el.className = isError ? 'msg error' : 'msg';
      el.innerText = msg || '';
    }

    function jsonp(url){
      return new Promise((resolve,reject)=>{
        const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
        const script = document.createElement('script');
        const src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
        const timer = setTimeout(()=>{ cleanup(); reject(new Error('JSONP timeout')); },10000);

        function cleanup(){
          clearTimeout(timer);
          if(script.parentNode) script.parentNode.removeChild(script);
          try{ delete window[cb]; }catch(e){}
        }

        window[cb] = function(data){ cleanup(); resolve(data); };
        script.onerror = function(){ cleanup(); reject(new Error('JSONP failed')); };
        script.src = src;
        document.body.appendChild(script);
      });
    }

    function goDashboard(){
      location.href = 'dashboard.html';
    }

    function statusClass(status){
      const s = String(status || '').trim();
      if(s === 'รอตรวจสอบ') return 'pending';
      if(s === 'ผ่าน' || s === 'อนุมัติ' || s === 'อนุมัติแล้ว') return 'approved';
      if(s === 'ไม่ผ่าน' || s === 'ตีกลับ') return 'rejected';
      return 'default';
    }

    function docNames(report){
      const docs = [];
      if(report.doc_schedule === 'Y') docs.push('ข้อ 1');
      if(report.doc_claim === 'Y') docs.push('ข้อ 2');
      if(report.doc_sign === 'Y') docs.push('ข้อ 3');
      if(report.doc_summary === 'Y') docs.push('ข้อ 4');
      if(report.doc_overtime_request === 'Y') docs.push('ข้อ 5');
      if(report.doc_memo_claim === 'Y') docs.push('ข้อ 6');
      if(report.doc_shift_change === 'Y') docs.push('ข้อ 7');
      return docs;
    }

    function renderReports(items){
      const box = document.getElementById('report_list');

      if(!items || !items.length){
        box.innerHTML = '<div class="empty">ยังไม่มีประวัติการส่งเอกสาร</div>';
        return;
      }

      box.innerHTML = items.map(item => {
        const docs = docNames(item).join(', ') || '-';
        const amount = item.fund_source === 'mof' ? (item.amount_mof || 0) : (item.amount_moph || 0);
        const review = item.review_note ? `
          <div class="review-note">
            <b>ผลการตรวจ:</b> ${item.review_status || item.status || '-'}<br>
            <b>เหตุผล / คำแนะนำ:</b> ${item.review_note || '-'}<br>
            <b>ตรวจโดย:</b> ${item.reviewed_by || '-'}<br>
            <b>วันที่ตรวจ:</b> ${item.reviewed_at || '-'}
          </div>
        ` : '';

        return `
          <div class="report-item">
            <div class="report-head">
              <div class="report-id">${item.report_id || '-'}</div>
              <div class="status ${statusClass(item.review_status || item.status)}">${item.review_status || item.status || '-'}</div>
            </div>

            <div class="meta">
              <div><b>วันที่ส่ง:</b> ${item.submit_date || '-'}</div>
              <div><b>เวลา:</b> ${item.submit_time || '-'}</div>
              <div><b>แหล่งเงิน:</b> ${item.fund_source === 'mof' ? 'กระทรวงการคลัง' : 'กระทรวงสาธารณสุข'}</div>
              <div><b>จำนวนเงิน:</b> ${amount || 0}</div>
              <div><b>หน่วยงาน:</b> ${item.department_name || '-'}</div>
              <div><b>เลขรายการ:</b> ${item.report_id || '-'}</div>
            </div>

            <div class="docs"><b>เอกสารที่ส่ง:</b> ${docs}</div>
            <div class="docs"><b>หมายเหตุผู้ส่ง:</b> ${item.note || '-'}</div>
            ${review}
          </div>`;
      }).join('');
    }

    async function initPage(){
      try{
        setMessage('กำลังเชื่อมต่อ LINE...');
        await liff.init({ liffId: LIFF_ID });

        if(!liff.isLoggedIn()){
          liff.login({ redirectUri: location.href });
          return;
        }

        const profile = await liff.getProfile();
        const lineUserId = profile.userId || '';
        document.getElementById('line_user_id').value = lineUserId;

        const userRes = await jsonp(API_BASE + '?action=getUserByLineId&line_user_id=' + encodeURIComponent(lineUserId));
        if(!(userRes && (userRes.data || userRes.line_user_id))){
          setMessage('ยังไม่พบข้อมูลผู้ใช้ กรุณาสมัครสมาชิกก่อน', true);
          setTimeout(() => { location.href = 'register.html'; }, 1200);
          return;
        }

        const user = userRes && userRes.data ? userRes.data : userRes;
        document.getElementById('display_name').value = user.display_name || '';
        document.getElementById('full_name').value = user.full_name || '';
        document.getElementById('department_name').value = user.department_name || user.department_id || '-';

        const reportRes = await jsonp(API_BASE + '?action=getReportsByUser&line_user_id=' + encodeURIComponent(lineUserId));
        log('getReportsByUser response: ' + JSON.stringify(reportRes));

        renderReports(reportRes && reportRes.data ? reportRes.data : (Array.isArray(reportRes) ? reportRes : []));
        setMessage('');
      }catch(err){
        log('ERROR initPage: ' + (err.message || err));
        setMessage('เกิดข้อผิดพลาดในการโหลดข้อมูล\\n' + (err.message || err), true);
      }
    }

    initPage();
  </script>
</body>
</html>
