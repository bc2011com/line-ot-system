<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตรวจสอบเอกสาร OT</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root{
      --green:#16a34a; --green-soft:#ecfdf3; --red:#dc2626; --red-soft:#fef2f2;
      --amber:#d97706; --amber-soft:#fffbeb; --blue:#1d4ed8; --muted:#64748b;
      --line:#e5e7eb; --card:#fff;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f8fafc 0%, #eef2f7 100%);color:#0f172a}
    .wrap{max-width:900px;margin:0 auto;padding:18px 16px 40px}
    .hero,.card,.empty,.no-perm{background:#fff;border-radius:24px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.05)}
    .hero{margin-bottom:18px}
    h1{margin:0 0 10px;font-size:40px;line-height:1.08;color:#14532d}
    .sub{font-size:18px;color:var(--muted);line-height:1.6}
    .chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .chip{display:inline-flex;align-items:center;padding:10px 14px;border-radius:999px;background:#ecfdf5;color:#166534;font-weight:700;font-size:16px}
    .msg{display:none;margin:14px 0 18px;padding:14px 16px;border-radius:18px;font-size:18px;line-height:1.5;white-space:pre-wrap}
    .msg.ok{display:block;background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}
    .msg.err{display:block;background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
    .btn{appearance:none;border:none;cursor:pointer;background:#16a34a;color:#fff;font-size:20px;font-weight:700;border-radius:16px;padding:14px 18px;box-shadow:0 8px 18px rgba(22,163,74,.18)}
    .btn.secondary{background:#fff;color:#0f172a;border:1px solid var(--line);box-shadow:none}
    .btn.small{font-size:18px;padding:12px 14px;border-radius:14px}
    .grid{display:grid;gap:14px}
    .title{font-size:34px;line-height:1.15;font-weight:800;margin:0 0 8px}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
    .box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:18px;padding:12px 14px}
    .label{font-size:14px;color:var(--muted);margin-bottom:4px}
    .value{font-size:20px;font-weight:700;word-break:break-word}
    .status-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0 14px}
    .badge{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:8px 14px;border-radius:999px;font-size:18px;font-weight:800}
    .pending{background:var(--amber-soft);color:var(--amber)}
    .passed{background:var(--green-soft);color:var(--green)}
    .failed{background:var(--red-soft);color:var(--red)}
    .note{width:100%;min-height:100px;resize:vertical;border:1px solid #d7dee8;border-radius:18px;padding:14px 16px;font-size:18px;outline:none;margin-top:6px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn-pending{background:#fff7ed;color:#b45309;border:2px solid #fdba74;box-shadow:none}
    .btn-pass{background:#ecfdf5;color:#166534;border:2px solid #86efac;box-shadow:none}
    .btn-fail{background:#fef2f2;color:#b91c1c;border:2px solid #fca5a5;box-shadow:none}
    .loading{text-align:center;padding:30px 16px;font-size:20px;color:var(--muted)}
    .no-perm,.empty{text-align:center;font-size:22px;color:#334155}
    .debug{display:none;margin-top:18px;padding:14px;border-radius:18px;background:#f8fafc;border:1px dashed #cbd5e1;color:#334155;font-size:15px;white-space:pre-wrap;word-break:break-word}
    @media (max-width:640px){h1{font-size:28px}.title{font-size:26px}.meta{grid-template-columns:1fr}.value{font-size:18px}.btn{font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>ตรวจสอบเอกสาร</h1>
      <div class="sub">สำหรับผู้ดูแลระบบและการเงิน ใช้ตรวจรายการส่งเอกสาร OT และอัปเดตผลการตรวจได้ทันที</div>
      <div class="chips">
        <div class="chip" id="chipUser">-</div>
        <div class="chip" id="chipRole">-</div>
        <div class="chip" id="chipDept">-</div>
      </div>
    </section>

    <div id="msg" class="msg"></div>

    <div class="toolbar">
      <button class="btn secondary" onclick="loadReports()">รีเฟรชรายการ</button>
      <button class="btn secondary" onclick="toggleDebug()">แสดง/ซ่อน Debug</button>
    </div>

    <div id="permissionBox" class="no-perm" style="display:none"></div>
    <div id="list" class="grid"><div class="loading">กำลังโหลดข้อมูล...</div></div>
    <pre id="debug" class="debug"></pre>
  </div>

<script>
const LIFF_ID = '2009688300-9LChW0zg';
const API_BASE = 'https://script.google.com/macros/s/AKfycbwQrnldZrUUNn5Yfpj2xj53p_Ux5T-15Nk8a5lICGlZOkWMcy5rNmavqJSXovwru__0/exec';

let currentProfile = null;
let currentUser = null;
let reportsCache = [];

function debugLog(text){
  const box = document.getElementById('debug');
  box.textContent += (box.textContent ? '\n' : '') + text;
}
function toggleDebug(){
  const box = document.getElementById('debug');
  box.style.display = box.style.display === 'block' ? 'none' : 'block';
}
function showMsg(text, ok = true){
  const el = document.getElementById('msg');
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.textContent = text;
}
function clearMsg(){
  const el = document.getElementById('msg');
  el.className = 'msg';
  el.textContent = '';
}
function unwrapResponse(res){
  return res && Object.prototype.hasOwnProperty.call(res, 'data') ? res.data : res;
}
function jsonp(params = {}){
  return new Promise((resolve, reject) => {
    const callback = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
    const qs = new URLSearchParams({ ...params, callback });
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 15000);
    function cleanup(){
      clearTimeout(timer);
      delete window[callback];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[callback] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('JSONP load error')); };
    script.src = API_BASE + '?' + qs.toString();
    document.body.appendChild(script);
  });
}
function roleLabel(role){
  const r = String(role || '').toLowerCase();
  if (r === 'admin') return 'ผู้ดูแลระบบ';
  if (r === 'finance') return 'การเงิน';
  if (r === 'staff') return 'เจ้าหน้าที่';
  return role || '-';
}
function statusClass(status){
  const s = String(status || '').trim();
  if (s === 'ผ่าน') return 'passed';
  if (s === 'ไม่ผ่าน') return 'failed';
  return 'pending';
}
async function initPage(){
  try{
    clearMsg();
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    currentProfile = await liff.getProfile();
    document.getElementById('chipUser').textContent = currentProfile.displayName || '-';
    debugLog('LINE profile => ' + JSON.stringify(currentProfile));
    const userRes = await jsonp({ action: 'getUserByLineId', line_user_id: currentProfile.userId });
    debugLog('getUserByLineId => ' + JSON.stringify(userRes));
    currentUser = unwrapResponse(userRes);
    if (!currentUser) {
      document.getElementById('permissionBox').style.display = 'block';
      document.getElementById('permissionBox').textContent = 'ไม่พบข้อมูลผู้ใช้ในระบบ กรุณากลับไปลงทะเบียนก่อน';
      document.getElementById('list').innerHTML = '';
      showMsg('ไม่พบข้อมูลผู้ใช้ในระบบ', false);
      return;
    }
    document.getElementById('chipRole').textContent = roleLabel(currentUser.role) + ' | ' + (currentUser.role || '-');
    document.getElementById('chipDept').textContent = currentUser.department_name || currentUser.department_id || '-';
    const allowed = ['admin', 'finance'].includes(String(currentUser.role || '').toLowerCase());
    if (!allowed) {
      document.getElementById('permissionBox').style.display = 'block';
      document.getElementById('permissionBox').textContent = 'หน้านี้ใช้สำหรับ admin และ finance เท่านั้น';
      document.getElementById('list').innerHTML = '';
      showMsg('คุณไม่มีสิทธิ์เข้าถึงหน้า ตรวจสอบเอกสาร', false);
      return;
    }
    await loadReports();
  }catch(err){
    debugLog('init error => ' + (err && err.stack ? err.stack : err));
    showMsg('โหลดข้อมูลไม่สำเร็จ: ' + err.message, false);
    document.getElementById('list').innerHTML = '<div class="empty">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
  }
}
async function loadReports(){
  try{
    document.getElementById('list').innerHTML = '<div class="loading">กำลังโหลดรายการเอกสาร...</div>';
    const res = await jsonp({ action: 'getAllReports' });
    debugLog('getAllReports => ' + JSON.stringify(res));
    reportsCache = unwrapResponse(res) || [];
    if (!Array.isArray(reportsCache) || reportsCache.length === 0){
      document.getElementById('list').innerHTML = '<div class="empty">ยังไม่มีรายการเอกสารในระบบ</div>';
      return;
    }
    renderReports(reportsCache);
    showMsg('โหลดข้อมูลสำเร็จ');
  }catch(err){
    debugLog('loadReports error => ' + (err && err.stack ? err.stack : err));
    showMsg('โหลดรายการเอกสารไม่สำเร็จ: ' + err.message, false);
    document.getElementById('list').innerHTML = '<div class="empty">โหลดรายการไม่สำเร็จ</div>';
  }
}
function renderReports(rows){
  const html = rows.map(r => {
    const rid = String(r.report_id || '');
    const status = r.review_status || r.status || 'รอตรวจสอบ';
    const note = r.review_note || '';
    return `
      <section class="card">
        <h2 class="title">${escapeHtml(r.full_name || r.display_name || '-')}</h2>
        <div class="status-row">
          <span class="badge ${statusClass(status)}">${escapeHtml(status)}</span>
          <span class="badge" style="background:#f8fafc;color:#334155;">${escapeHtml(r.department_name || '-')}</span>
          <span class="badge" style="background:#eff6ff;color:#1d4ed8;">${escapeHtml(r.fund_source || '-')}</span>
        </div>
        <div class="meta">
          <div class="box"><div class="label">รหัสรายการ</div><div class="value">${escapeHtml(rid || '-')}</div></div>
          <div class="box"><div class="label">วันที่/เวลา</div><div class="value">${escapeHtml((r.submit_date || '-') + ' ' + (r.submit_time || ''))}</div></div>
          <div class="box"><div class="label">ยอด สธ.</div><div class="value">${escapeHtml(r.amount_moph || '-')}</div></div>
          <div class="box"><div class="label">ยอดการคลัง</div><div class="value">${escapeHtml(r.amount_mof || '-')}</div></div>
        </div>
        <div class="box" style="margin-top:12px">
          <div class="label">หมายเหตุจากผู้ส่ง</div>
          <div class="value" style="font-size:18px;font-weight:600">${escapeHtml(r.note || '-')}</div>
        </div>
        <div class="box" style="margin-top:12px">
          <div class="label">แก้ไขผลการตรวจ</div>
          <textarea class="note" id="note_${rid}" placeholder="ระบุหมายเหตุ เช่น เอกสารไม่ครบ / ผ่านการตรวจแล้ว">${escapeHtml(note)}</textarea>
          <div class="actions">
            <button class="btn small btn-pending" onclick="saveStatus('${rid}','รอตรวจสอบ')">รอตรวจสอบ</button>
            <button class="btn small btn-pass" onclick="saveStatus('${rid}','ผ่าน')">ผ่าน</button>
            <button class="btn small btn-fail" onclick="saveStatus('${rid}','ไม่ผ่าน')">ไม่ผ่าน</button>
          </div>
        </div>
      </section>`;
  }).join('');
  document.getElementById('list').innerHTML = html;
}
async function saveStatus(reportId, status){
  try{
    if (!currentUser) return;
    const noteEl = document.getElementById('note_' + reportId);
    const note = noteEl ? noteEl.value.trim() : '';
    showMsg('กำลังบันทึกผลการตรวจ...');
    const res = await jsonp({
      action: 'updateReportStatus',
      report_id: reportId,
      review_status: status,
      review_note: note,
      reviewed_by: currentUser.line_user_id || ''
    });
    debugLog('updateReportStatus => ' + JSON.stringify(res));
    if (!res || res.ok !== true) throw new Error((res && res.message) || 'บันทึกไม่สำเร็จ');
    showMsg('บันทึกผลการตรวจเรียบร้อย');
    await loadReports();
  }catch(err){
    debugLog('saveStatus error => ' + (err && err.stack ? err.stack : err));
    showMsg('บันทึกผลการตรวจไม่สำเร็จ: ' + err.message, false);
  }
}
function escapeHtml(text){
  return String(text == null ? '' : text)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
initPage();
</script>
</body>
</html>
